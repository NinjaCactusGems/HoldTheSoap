name: Deploy preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: preview-${{ github.head_ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      # Previews run against their own party Worker (holdthesoap-party-preview),
      # NOT the production one, so server-side changes on a PR can be exercised
      # without touching live prod. It's a single shared preview Worker —
      # rooms are per-code Durable Objects, and each preview push redeploys it
      # with that branch's code, so the most recently pushed PR's server wins.
      - name: Resolve preview party host
        id: party-host
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -eo pipefail
          # Always derive the preview Worker's workers.dev host (the prod
          # PARTY_HOST override is intentionally ignored here — using it would
          # point previews back at the production Worker and defeat isolation).
          BODY=$(curl -sS -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/subdomain")
          SUB=$(echo "$BODY" | jq -r '.result.subdomain // empty')
          if [ -z "$SUB" ]; then
            echo "::warning::No workers.dev subdomain available; preview will fall back to localhost:1999"
            echo "value=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "value=holdthesoap-party-preview.${SUB}.workers.dev" >> "$GITHUB_OUTPUT"

      - name: Deploy preview party worker
        if: steps.party-host.outputs.value != ''
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_KEY }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config party/wrangler.toml --name holdthesoap-party-preview

      - run: npm run build
        env:
          VITE_PARTY_HOST: ${{ steps.party-host.outputs.value }}

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_KEY }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./dist --project-name=holdthesoap --branch=${{ github.head_ref }}

      - name: Comment preview URL on PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: cloudflare-pages-preview
          message: |
            ### Cloudflare Pages preview deployed

            - **Preview:** ${{ steps.deploy.outputs.deployment-url }}
            - **Preview (testing mode):** ${{ steps.deploy.outputs.deployment-url }}/?test=1
            - **Commit:** ${{ github.event.pull_request.head.sha }}
            - **Branch:** `${{ github.head_ref }}`

            Testing mode adds lobby controls for self-eliminating bots. The preview is rebuilt on every push to this PR.
